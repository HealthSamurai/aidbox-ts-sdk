name: Aidbox Client

on:
  push:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
      - name: Install node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: packages/aidbox-client

      - name: Typescheck
        run: pnpm typecheck
        working-directory: packages/aidbox-client

      - name: Run linting
        run: pnpm lint:check
        working-directory: packages/aidbox-client

      - name: Run tests
        run: pnpm test
        working-directory: packages/aidbox-client
